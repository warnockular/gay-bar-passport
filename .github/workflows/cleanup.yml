name: Cleanup bootstrap artifacts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove temporary bootstrap files
        run: |
          find . -name '._*' -delete
          rm -f .github/workflows/bootstrap.yml .github/workflows/cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean bootstrap artifacts" || exit 0
          git push
