name: Bootstrap repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand project archive
        run: |
          cat > project.tar.gz.b64 <<'EOF_PROJECT'
          
          EOF_PROJECT
          base64 -d project.tar.gz.b64 > project.tar.gz
          tar -xzf project.tar.gz
          rm project.tar.gz project.tar.gz.b64
      - name: Commit project files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bootstrap Gay Bar Passport project" || exit 0
          git push
