name: Sync Phase 3 from Codex

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode project archive
        run: |
          cat > /tmp/project.tar.gz.b64 <<'ARCHIVE'
          
          ARCHIVE
          base64 -d /tmp/project.tar.gz.b64 > /tmp/project.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/project.tar.gz -C .
          find . -name "._*" -delete
      - name: Commit Phase 3 update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add Phase 3 authentication and profiles"
          git push
